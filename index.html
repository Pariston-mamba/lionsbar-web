<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>獅子酒吧</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

input, button {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

input {
    background: #222;
    color: white;
}

button {
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

#log {
    background: #222;
    height: 300px;
    overflow-y: auto;
    padding: 10px;
    border-radius: 8px;
    text-align: left;
    margin-top: 20px;
}

.card-buttons {
    display: flex;
    gap: 10px;
}

.card-buttons button {
    flex: 1;
}
</style>
</head>
<body>

<div class="container">
    <h1>🦁 獅子酒吧</h1>

    <input id="room" placeholder="輸入房號">
    <input id="player" placeholder="你的名字">

    <button onclick="connect()">加入房間</button>

    <div class="card-buttons">
        <button onclick="playCard('A')">A</button>
        <button onclick="playCard('K')">K</button>
        <button onclick="playCard('Q')">Q</button>
    </div>

    <button onclick="challenge()">質疑</button>

    <div id="log"></div>
</div>

<script>
let socket;
let playerName;

function log(message) {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML += "<div>" + message + "</div>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

function connect() {
    const room = document.getElementById("room").value;
    playerName = document.getElementById("player").value;

    if (!room || !playerName) {
        alert("請輸入房號與名字");
        return;
    }

    const protocol = location.protocol === "https:" ? "wss" : "ws";
    socket = new WebSocket(`${protocol}://${location.host}/ws/${room}`);

    socket.onopen = () => {
        log("已連線");
    };

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "system") {
            log("📢 " + data.message);
        }

        if (data.type === "chat") {
            log(data.message);
        }

        if (data.type === "play") {
            log(`🎴 ${data.player} 打出 ${data.card}`);
        }

        if (data.type === "challenge") {
            log(`⚠️ ${data.player} 發起質疑`);
        }
    };

    socket.onclose = () => {
        log("連線中斷");
    };
}

function playCard(card) {
    if (!socket) return;

    socket.send(JSON.stringify({
        type: "play",
        player: playerName,
        card: card
    }));
}

function challenge() {
    if (!socket) return;

    socket.send(JSON.stringify({
        type: "challenge",
        player: playerName
    }));
}
</script>

</body>
</html>
