<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>狮子酒吧</title>
    <link rel="icon" type="image/png" href="/static/lion.png" />
    <meta property="og:title" content="狮子酒吧" />
    <meta property="og:description" content="2–6 人联机桌游。出牌、撒谎、质疑——最后活下来的人才是赢家。" />
    <meta property="og:image" content="https://lionsbar-web.onrender.com/static/lion.png" />
    <meta property="og:url" content="https://lionsbar-web.onrender.com" />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Lionsbar</p>
          <h1>狮子酒吧</h1>
        </div>
        <div class="status" id="connectionStatus">未连接</div>
      </header>
      <section class="panel" id="homePanel">
        <h2>开房或加入</h2>
        <div class="stack">
          <button class="primary" id="createRoomBtn">创建房间</button>
          <label>
            房间代码
            <input id="roomInput" maxlength="6" autocomplete="off" placeholder="例如 AB12" />
          </label>
          <button id="joinByCodeBtn">加入房间</button>
        </div>
      </section>
      <section class="panel hidden" id="joinPanel">
        <div class="roomline">
          <div>
            <span class="muted">房间</span>
            <strong id="roomCodeLabel">----</strong>
          </div>
          <button class="small" id="copyLinkBtn">复制链接</button>
        </div>
        <label>
          你的名字
          <input id="nameInput" maxlength="16" autocomplete="nickname" placeholder="输入名字" />
        </label>
        <button class="primary" id="enterRoomBtn">进入房间</button>
      </section>
      <section class="game hidden" id="gamePanel">
        <section class="panel room-head">
          <div>
            <span class="muted">房间</span>
            <strong id="gameRoomCode">----</strong>
          </div>
          <button class="small" id="copyLinkBtn2">复制链接</button>
        </section>
        <section class="panel">
          <div class="round-grid">
            <div>
              <span class="muted">桌面牌</span>
              <div class="rank" id="tableRank">A</div>
            </div>
            <div>
              <span class="muted">桌上牌数</span>
              <div class="rank secondary" id="tableCount">0</div>
            </div>
          </div>
          <p class="turn" id="turnText">等待玩家加入。</p>
          <div class="claim hidden" id="claimBox"></div>
        </section>
        <section class="panel">
          <div class="section-title">
            <h2>玩家</h2>
            <button class="small hidden" id="startGameBtn">开始游戏</button>
            <button class="small hidden" id="rematchBtn">回到大厅</button>
          </div>
          <div class="players" id="playersList"></div>
        </section>
        <section class="panel" id="handPanel">
          <div class="section-title">
            <h2>你的手牌</h2>
            <span class="muted" id="handHint">最多出 3 张</span>
          </div>
          <div class="hand" id="handCards"></div>
          <button class="primary hidden" id="playCardsBtn">出牌</button>
        </section>
        <section class="panel hidden" id="challengePanel">
          <h2>是否质疑？</h2>
          <div class="actions">
            <button class="danger" id="challengeBtn">质疑</button>
            <button id="passBtn">放行并出牌</button>
          </div>
        </section>
        <section class="panel">
          <h2>记录</h2>
          <div class="log" id="logList"></div>
        </section>
      </section>
    </main>
    <div class="toast hidden" id="toast"></div>
    <script src="/static/app.js" defer></script>
  </body>
</html>
